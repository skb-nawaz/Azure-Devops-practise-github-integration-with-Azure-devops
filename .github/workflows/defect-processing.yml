name: Defect Processing Pipeline

on:
  workflow_dispatch:
    inputs:
      runId:
        description: "Regression Pipeline Run ID"
        required: false
        default: "28373624640"
        type: string

  push:
    branches:
      - feature/two-pipeline-defect-framework

permissions:
  actions: read
  contents: read

jobs:
  defects:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Download Regression Artifacts
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.inputs.runId || '28373624640' }}
          name: regression-artifacts
          path: regression-download

      - name: Print Files
        run: |
          echo "Current Directory:"
          pwd

          echo ""
          echo "Downloaded Files:"
          ls -R

      # Temporary fix so approve-bugs.ts can run
      - name: Create approve.json
        run: |
          mkdir -p candidate-bugs
          echo '{"approved":["Practice Test 1","Practice Test 5"]}' > candidate-bugs/approve.json
          cat candidate-bugs/approve.json

      - name: Approve Bugs
        run: npx tsx scripts/approve-bugs.ts